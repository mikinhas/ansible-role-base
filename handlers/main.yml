---
- name: Restart unattended-upgrades
  become: true
  ansible.builtin.systemd_service:
    name: unattended-upgrades
    state: restarted

- name: Restart sshd
  become: true
  ansible.builtin.systemd_service:
    name: ssh
    state: restarted

- name: Restart fail2ban
  become: true
  ansible.builtin.systemd_service:
    name: fail2ban
    state: restarted

...
