---
- name: Install UFW
  become: true
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default deny incoming
  become: true
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set default allow outgoing
  become: true
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH port
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ base_ssh_port | string }}"
    proto: tcp
    comment: SSH

- name: Allow extra ports
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ base_ufw_extra_rules }}"

- name: Enable UFW
  become: true
  community.general.ufw:
    state: enabled
...
