---
- name: Install fail2ban
  become: true
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Configure fail2ban SSH jail
  become: true
  ansible.builtin.template:
    src: fail2ban/jail.d/sshd.conf.j2
    dest: /etc/fail2ban/jail.d/sshd.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Deploy fail2ban filters
  become: true
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "/etc/fail2ban/filter.d/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ base_fail2ban_filters }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart fail2ban

- name: Deploy fail2ban jails
  become: true
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "/etc/fail2ban/jail.d/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ base_fail2ban_jails }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart fail2ban

- name: Enable fail2ban service
  become: true
  ansible.builtin.systemd_service:
    name: fail2ban
    enabled: true
    state: started
...
